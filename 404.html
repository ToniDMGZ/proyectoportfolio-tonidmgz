<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Página no encontrada | Toni DMGZ Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #951313 0%, #751212 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .error-container {
            text-align: center;
            color: white;
            max-width: 600px;
        }
        
        .error-code {
            font-size: 8rem;
            font-weight: bold;
            line-height: 1;
            margin-bottom: 0.5rem;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .error-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        
        .error-message {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            opacity: 0.95;
            line-height: 1.6;
        }
        
        .redirect-notice {
            background: rgba(255,255,255,0.1);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            border-left: 4px solid #1abc9c;
        }
        
        .redirect-text {
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
        }
        
        .countdown {
            font-size: 1.8rem;
            font-weight: bold;
            color: #1abc9c;
            margin: 1rem 0;
        }
        
        .btn {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: #1abc9c;
            color: #000;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(26, 188, 156, 0.3);
        }
        
        @media (max-width: 480px) {
            .error-code {
                font-size: 4rem;
            }
            .error-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-title">Página no encontrada</div>
        <div class="error-message">
            Lo sentimos, la página que buscas no existe. 
            Te redirigiremos al inicio en unos momentos.
        </div>
        
        <div class="redirect-notice">
            <div class="redirect-text">Redirigiendo en:</div>
            <div class="countdown" id="countdown">5</div>
        </div>
        
        <button class="btn" onclick="goHome()">Ir al inicio ahora</button>
    </div>

    <script>
        function goHome() {
            window.location.href = '/index.html';
        }

        let count = 5;
        const countdownElement = document.getElementById('countdown');

        const interval = setInterval(() => {
            count--;
            countdownElement.textContent = count;
            
            if (count <= 0) {
                clearInterval(interval);
                goHome();
            }
        }, 1000);
    </script>
</body>
</html>
